<section class="reviews relative">
  <div class="container">
    <img class="reviews__top-img" src="images/reviews-img.webp" alt="reviews-img">
    <h2 class="reviews__title _title relative">
      Уровень сервиса подтверждает огромное<br>
      количество независимых отзывов
    </h2>
    <div class="reviews__filters filters">
      <div class="reviews__filters-btns">
        <div class="reviews__filters-btn filters-btn active" data-filter="yandex">
          <div class="reviews__filters-logo">
            @@include('../../images/icons/reviews-yandex.svg')
          </div>
          <img class="reviews__filters-stars" src="images/reviews-yandex-stars.webp" alt="reviews-yandex">
        </div>
        <div class="reviews__filters-btn filters-btn" data-filter="gis">
          <div class="reviews__filters-logo">
            @@include('../../images/icons/reviews-gis.svg')
          </div>
          <img class="reviews__filters-stars" src="images/reviews-gis-stars.webp" alt="reviews-gis">
        </div>
      </div>
      <div class="reviews__swiper-wrapper relative">
        <div class="reviews__swiper swiper">
          <div class="swiper-wrapper">
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-1.webp" alt="reviews-1">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-2.webp" alt="reviews-2">
            </div>
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-3.webp" alt="reviews-3">
            </div>
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-1.webp" alt="reviews-1">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-2.webp" alt="reviews-2">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-3.webp" alt="reviews-3">
            </div>
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-1.webp" alt="reviews-1">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-2.webp" alt="reviews-2">
            </div>
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-3.webp" alt="reviews-3">
            </div>
            <div class="reviews__slide swiper-slide filters-item yandex active">
              <img class="reviews__slide-img" src="images/reviews-1.webp" alt="reviews-1">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-2.webp" alt="reviews-2">
            </div>
            <div class="reviews__slide swiper-slide filters-item gis">
              <img class="reviews__slide-img" src="images/reviews-3.webp" alt="reviews-3">
            </div>
          </div>
        </div>
        <div class="swiper-button-prev reviews__prev"></div>
        <div class="swiper-button-next reviews__next"></div>
      </div>
    </div>
    <div class="reviews__bottom">
      <img class="reviews__bottom-img" src="images/reviews-rating-1.webp" alt="reviews-rating-1">
      <img class="reviews__bottom-img" src="images/reviews-rating-2.webp" alt="reviews-rating-2">
      <img class="reviews__bottom-img" src="images/reviews-rating-3.webp" alt="reviews-rating-3">
      <img class="reviews__bottom-img" src="images/reviews-rating-4.webp" alt="reviews-rating-4">
      <img class="reviews__bottom-img" src="images/reviews-rating-5.webp" alt="reviews-rating-5">
      <img class="reviews__bottom-img" src="images/reviews-rating-6.webp" alt="reviews-rating-6">
    </div>
  </div>
</section>
