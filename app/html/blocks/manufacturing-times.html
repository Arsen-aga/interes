<section class="manufacturing-times">
  <div class="container">
    <h2 class="manufacturing-times__title _title">
      Сроки изготовления
    </h2>
    @@include('../components/cursor.html')
    <div class="manufacturing-times__items">
      <div class="manufacturing-times__item">
        <h4 class="manufacturing-times__item-title">
          от 7–10 рабочих дней
        </h4>
        <p class="manufacturing-times__item-text">
          Встроенные и корпусные шкафы
        </p>
        <div class="manufacturing-times__wrapper-img">
          <img class="manufacturing-times__item-img _img" src="images/manufacturing-times-1.webp"
            alt="manufacturing-times-1">
        </div>
      </div>
      <div class="manufacturing-times__item">
        <h4 class="manufacturing-times__item-title">
          от 14 дней
        </h4>
        <p class="manufacturing-times__item-text">
          Комплексные прихожие и гардеробные
        </p>
        <div class="manufacturing-times__wrapper-img">
          <img class="manufacturing-times__item-img _img" src="images/manufacturing-times-2.webp"
            alt="manufacturing-times-2">
        </div>
      </div>
      <div class="manufacturing-times__item">
        <h4 class="manufacturing-times__item-title">
          от 30 дней
        </h4>
        <p class="manufacturing-times__item-text">
          Кухонные гарнитуры, в зависимости<br>
          от фасадов и фурнитуры
        </p>
        <div class="manufacturing-times__wrapper-img">
          <img class="manufacturing-times__item-img _img" src="images/manufacturing-times-3.webp"
            alt="manufacturing-times-3">
        </div>
      </div>
    </div>
  </div>
</section>
