<section class="front-block-thankyou _image-wrapper">
  <div class="overlay"></div>
  <div class="container relative">
    <div class="front-block-thankyou__inner">
      <h1 class="front-block-thankyou__title _main-title">
        Все прошло<br>
        успешно!
      </h1>
      <p class="front-block-thankyou__subtitle">
        Менеджеру салона <span>необходимо задать<br>
          вам несколько уточняющих вопросов</span>
      </p>
      <div class="front-block-thankyou__info">
        <div class="front-block-thankyou__info-icon">
          @@include('../../images/icons/info.svg')
        </div>
        <p class="front-block-thankyou__info-text">
          Пожалуйста, проверьте корректность<br>
          введенного вами номера телефона
        </p>
      </div>
      <div class="front-block-thankyou__btns">
        <p class="front-block-thankyou__phone">
          +7 999 610 77 89
        </p>
        <a class="front-block-thankyou__btn _main-btn" href="#change-number" data-fancybox>
          Нашел ошибку в номере,<br>
          хочу ввести корректный
        </a>
      </div>
    </div>
  </div>
</section>
